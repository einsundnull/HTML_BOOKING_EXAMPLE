<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard — Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <script src="./js/app-config.js"></script>
  <script>
    (function() {
      var v = typeof APP_VERSION !== 'undefined' ? ('?v=' + APP_VERSION) : '';
      var css = [
        './css/tokens.css',
        './css/base.css',
        './css/components.css',
        './css/navbar.css',
        './css/profile.css',
        './css/wallet.css',
        './css/chat.css',
        './css/dashboard.css'
      ];
      var head = document.head;
      for (var i = 0; i < css.length; i++) {
        var link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = css[i] + v;
        head.appendChild(link);
      }
    }());
  </script>
</head>
<body>

<div class="app-shell">
  <main class="page">

    <div class="page-header">
      <h2 id="dash-title">Dashboard</h2>
      <p id="dash-subtitle">Deine nächsten Stunden auf einen Blick.</p>
    </div>

    <!-- Stats row — 2×y grid -->
    <div class="stats-row stats-row--2col" id="dash-stats-row"></div>

    <!-- Calendar quick-link -->
    <a class="dash-calendar-btn" id="dash-calendar-link" href="#">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 6h14M5 1v2M11 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Kalender öffnen
      <svg class="dash-calendar-btn-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <!-- Schedule list -->
    <div id="dash-schedule"></div>

  </main>
</div>

<!-- Chat FAB — standalone, immer sichtbar -->
<div class="chat-fab-anchor">
  <button class="chat-fab" id="chat-fab" aria-label="Chat">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<script>
window.addEventListener('load', function() {
  ChatPanel.init();
});
</script>

</body>
</html>
