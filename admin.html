<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css?v=3" />
  <link rel="stylesheet" href="./css/base.css?v=9" />
  <link rel="stylesheet" href="./css/components.css?v=3" />
  <link rel="stylesheet" href="./css/navbar.css?v=9" />
</head>
<body>
<div class="app-shell">

  <main class="page">
    <div class="page-header">
      <h2>User management</h2>
      <p>Create and manage teachers and students.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Teachers</div><div class="stat-value" id="stat-teachers">—</div></div>
      <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value" id="stat-students">—</div></div>
      <div class="stat-card"><div class="stat-label">Total bookings</div><div class="stat-value" id="stat-bookings">—</div></div>
    </div>

    <div class="admin-grid">
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Create user</div><div class="card-description">Add a teacher or student.</div></div>
        </div>
        <form id="create-form" novalidate>
        <div class="form-stack">
          <div class="form-group">
            <label class="form-label" for="f-uid">UID</label>
            <input class="form-input" type="text" id="f-uid" placeholder="e.g. t1, s2" autocapitalize="none" spellcheck="false" />
            <span class="form-error-msg" id="e-uid" style="display:none;"></span>
            <span class="form-hint">Unique identifier — used to sign in.</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-name">Name</label>
            <input class="form-input" type="text" id="f-name" placeholder="Full name" />
            <span class="form-error-msg" id="e-name" style="display:none;"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-role">Role</label>
            <select class="form-select" id="f-role">
              <option value="">Select role…</option>
              <option value="teacher">Teacher</option>
              <option value="student">Student</option>
            </select>
            <span class="form-error-msg" id="e-role" style="display:none;"></span>
          </div>
          <button class="btn btn-primary btn-self-start" id="create-btn" type="submit">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Create user
          </button>
        </div>
        </form>
      </div>

      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Users</div><div class="card-description">All teachers and students.</div></div>
          <div class="segmented">
            <button class="segmented-btn active" data-tab="teacher">Teachers</button>
            <button class="segmented-btn" data-tab="student">Students</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>UID</th><th>Name</th><th>Info</th><th>Action</th></tr></thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="./js/store.js?v=3"></script>
<script src="./js/profile.js?v=8"></script>
<script src="./js/auth.js?v=3"></script>
<script src="./js/ui.js?v=9"></script>
<script src="./js/navbar.js?v=13"></script>
<script src="./js/admin.js?v=10"></script>
</body>
</html>
