<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil bearbeiten — BookingSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css?v=8" />
  <link rel="stylesheet" href="./css/base.css?v=9" />
  <link rel="stylesheet" href="./css/components.css?v=8" />
  <link rel="stylesheet" href="./css/navbar.css?v=9" />
  <link rel="stylesheet" href="./css/profile.css?v=11" />
</head>
<body>

<div class="app-shell">

  <main class="page">
    <div class="profile-edit-page">

      <!-- Topbar -->
      <div class="profile-edit-topbar">
        <div class="profile-edit-topbar-left">
          <h1>Profil bearbeiten</h1>
          <p>Dein öffentliches Profil für Schüler</p>
        </div>
        <div class="profile-edit-topbar-actions">
          <button class="btn btn-ghost" id="profile-view-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Profil ansehen
          </button>
        </div>
      </div>

      <!-- Dynamic content injected by ProfileEdit.init() -->
      <div id="profile-edit-main"></div>

    </div>
  </main>

<!-- Sticky Save FAB -->
<div class="profile-save-fab" id="profile-save-fab" aria-label="Ungespeicherte Änderungen">
  <button class="profile-fab-btn profile-fab-discard" id="profile-fab-discard">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Verwerfen
  </button>
  <button class="profile-fab-btn profile-fab-save" id="profile-save-btn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V4l-2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M11 2v4H5V2M5 9h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Profil speichern
  </button>
</div>

<!-- ── Section jump buttons ─────────────────────────────────── -->
<div class="section-jumper" id="edit-section-jumper">
  <button class="section-jump-btn" id="edit-jump-top" aria-label="Ganz nach oben">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 6l4-4 4 4"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="section-jump-btn" id="edit-jump-up" aria-label="Vorheriger Abschnitt">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="section-jump-btn" id="edit-jump-down" aria-label="Nächster Abschnitt">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

</div>

<script src="./js/store.js?v=8"></script>
<script src="./js/email.js?v=2"></script>
<script src="./js/auth.js?v=8"></script>
<script src="./js/ui.js?v=9"></script>
<script src="./js/profile.js?v=11"></script>
<script src="./js/navbar.js?v=13"></script>
<script>
window.addEventListener('load', function() {
  Navbar.init('profile');
  ProfileEdit.init();
});
</script>

</body>
</html>
