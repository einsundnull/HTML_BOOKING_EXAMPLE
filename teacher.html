<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher — Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css?v=8" />
  <link rel="stylesheet" href="./css/base.css?v=9" />
  <link rel="stylesheet" href="./css/components.css?v=9" />
  <link rel="stylesheet" href="./css/navbar.css?v=9" />
  <link rel="stylesheet" href="./css/teacher.css?v=8" />
  <link rel="stylesheet" href="./css/chat.css?v=4" />
</head>
<body>

<div class="app-shell">

  <main class="page">

    <div class="page-header">
      <h2>My calendar</h2>
      <p>Manage your availability and view bookings.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Students</div>
        <div class="stat-value" id="stat-students">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Booked</div>
        <div class="stat-value" id="stat-booked">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Available</div>
        <div class="stat-value" id="stat-available">—</div>
      </div>
    </div>

    <!-- View tabs -->
    <div class="view-nav">
      <button class="view-nav-btn active" id="nav-schedule">Schedule</button>
      <button class="view-nav-btn" id="nav-all-bookings">All bookings</button>
    </div>

    <!-- Schedule view -->
    <div id="view-schedule">
    <div class="teacher-layout">

      <!-- Month calendar -->
      <div class="card" id="section-calendar">
        <div class="cal-nav">
          <button class="cal-btn" id="prev-btn" aria-label="Previous month">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="cal-nav-label" id="month-label"></span>
          <button class="cal-btn" id="next-btn" aria-label="Next month">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">Mo</div>
          <div class="cal-weekday">Tu</div>
          <div class="cal-weekday">We</div>
          <div class="cal-weekday">Th</div>
          <div class="cal-weekday">Fr</div>
          <div class="cal-weekday">Sa</div>
          <div class="cal-weekday">Su</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
        <div class="cal-legend">
          <div class="cal-legend-item">
            <span class="cal-legend-dot cal-legend-dot-booked"></span>
            Has bookings
          </div>
        </div>
      </div>

      <!-- Day panel with sub-tabs -->
      <div id="section-daypanel">
        <div id="day-nav-sentinel"></div>
        <div id="day-nav-bar" class="day-nav-bar">
          <button class="day-nav-btn" id="day-nav-prev-month" aria-label="Previous month"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12L4 8l4-4M12 12L8 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button class="day-nav-btn" id="day-nav-prev" aria-label="Previous day"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <span class="day-nav-label" id="day-nav-label"></span>
          <button class="day-nav-btn" id="day-nav-next" aria-label="Next day"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button class="day-nav-btn" id="day-nav-next-month" aria-label="Next month"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 12l4-4-4-4M8 12l4-4-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="card">
          <div class="day-tab-nav">
            <button class="day-tab-btn active" id="day-tab-availability">Verfügbarkeit</button>
            <button class="day-tab-btn" id="day-tab-bookings">Buchungen</button>
          </div>
          <div id="day-panel"></div>
        </div>
      </div>

      <!-- Student list -->
      <div class="card col-students">
        <div class="card-header">
          <div>
            <div class="card-title">My students</div>
            <div class="card-description">Students who selected you.</div>
          </div>
        </div>
        <div id="student-list"></div>
      </div>

    </div>
    </div><!-- /view-schedule -->

    <!-- All bookings view -->
    <div id="view-all-bookings" class="view-hidden">
      <div class="all-bookings-toolbar">
        <label class="form-label">Student</label>
        <div class="custom-dropdown" id="bookings-student-dropdown">
          <button type="button" class="custom-dropdown-trigger" id="bookings-student-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="custom-dropdown-label" id="bookings-student-label">Alle Schüler</span>
            <svg class="custom-dropdown-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <ul class="custom-dropdown-list" id="bookings-student-list" role="listbox" aria-label="Schüler auswählen"></ul>
        </div>
        <button class="btn btn-secondary btn-sm" id="bookings-sort-btn" aria-label="Älteste zuerst — umkehren">
          <span class="sort-icon-asc">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 2v10M3 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="sort-icon-desc is-hidden">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 12V2M3 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </div>
      <div class="booking-time-filter">
        <button class="booking-time-btn" id="filter-past">Vergangen</button>
        <button class="booking-time-btn active" id="filter-upcoming">Kommende</button>
        <button class="booking-time-btn" id="filter-all">Alle</button>
      </div>
      <div id="all-bookings-list"></div>
    </div>

  </main>
</div>

<!-- ══════════════════════════════════════════════════════
     SLOT GRID FULLSCREEN OVERLAY
══════════════════════════════════════════════════════ -->
<div id="slot-grid-overlay" class="slot-grid-overlay" role="dialog" aria-modal="true" aria-label="Slot editor">

  <div class="grid-topbar">

    <!-- Left: close + save -->
    <div class="grid-topbar-left">
      <button class="grid-round-btn" id="grid-close-btn" aria-label="Close slot editor">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="grid-round-btn-save" id="grid-save-btn" aria-label="Save slots">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <span class="grid-topbar-title">Slot editor</span>

    <!-- Mode toggle -->
    <div class="grid-mode-toggle" role="group" aria-label="Edit mode">
      <button class="grid-mode-btn active-available" id="mode-btn-available">Available</button>
      <button class="grid-mode-btn" id="mode-btn-timeout">Timeout</button>
    </div>

    <!-- Legend -->
    <div class="grid-legend" aria-hidden="true">
      <div class="grid-legend-item">
        <span class="grid-legend-swatch swatch-available"></span>
        Available (recurring)
      </div>
      <div class="grid-legend-item">
        <span class="grid-legend-swatch swatch-timeout"></span>
        Timeout
      </div>
      <div class="grid-legend-item">
        <span class="grid-legend-swatch swatch-booked"></span>
        Booked
      </div>
    </div>

    <!-- Week nav (right) -->
    <div class="grid-topbar-right">
      <div class="grid-week-nav">
        <button class="cal-btn" id="grid-prev-week" aria-label="Previous week">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="grid-week-label" id="grid-week-label"></span>
        <button class="cal-btn" id="grid-next-week" aria-label="Next week">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Scrollable grid -->
  <div class="grid-scroll">
    <div id="slot-grid-content"></div>
  </div>

</div>

<!-- Floating booking save/dismiss buttons -->
<div id="booking-fab-group" class="booking-fab-group" aria-label="Pending booking changes">
  <button id="booking-dismiss-btn" class="booking-fab booking-fab-dismiss" aria-label="Dismiss changes">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Dismiss</span>
  </button>
  <button id="booking-save-btn" class="booking-fab booking-fab-save" aria-label="Save booking changes">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2.5 8l4 4L13.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Save</span>
    <span class="save-badge">0</span>
  </button>
</div>

<script src="./js/store.js?v=8"></script>
<script src="./js/profile.js?v=12"></script>
  <script src="./js/email.js?v=2"></script>
<script src="./js/auth.js?v=8"></script>
<script src="./js/ui.js?v=9"></script>
<script src="./js/navbar.js?v=14"></script>
<script src="./js/teacher.js?v=12"></script>
<script src="./js/chat.js?v=4"></script>
<script>
window.addEventListener('load', function() {
  ChatPanel.init();
  document.getElementById('booking-save-btn').addEventListener('click', saveBookingChanges);
  document.getElementById('day-nav-prev').addEventListener('click', function() { navDay(-1); });
  document.getElementById('day-nav-next').addEventListener('click', function() { navDay(1); });
  document.getElementById('day-nav-prev-month').addEventListener('click', function() { navMonth(-1); });
  document.getElementById('day-nav-next-month').addEventListener('click', function() { navMonth(1); });
  document.getElementById('jump-up').addEventListener('click', function() { jumpSection(-1); });
  document.getElementById('jump-down').addEventListener('click', function() { jumpSection(1); });
  updateJumpBtns();
  document.getElementById('booking-dismiss-btn').addEventListener('click', discardBookingChanges);
});
</script>

<!-- Section jump buttons -->
<div class="section-jumper" id="section-jumper">
  <button class="section-jump-btn" id="jump-up" aria-label="Jump to previous section">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 10l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="section-jump-btn" id="jump-down" aria-label="Jump to next section">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<!-- Chat FAB — standalone, immer sichtbar -->
<div class="chat-fab-anchor">
  <button class="chat-fab" id="chat-fab" aria-label="Chat">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>
</body>
</html>
