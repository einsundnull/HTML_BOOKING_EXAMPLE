<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lehrerprofil — BookingSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <script src="./js/app-config.js"></script>
  <script>
    /* CSS-Injection: versioned CSS links, synchron — browser blockiert Rendering */
    (function() {
      var v = typeof APP_VERSION !== 'undefined' ? ('?v=' + APP_VERSION) : '';
      var css = [
        './css/tokens.css',
        './css/base.css',
        './css/components.css',
        './css/navbar.css',
        './css/profile.css',
        './css/chat.css',
      ];
      var head = document.head;
      for (var i = 0; i < css.length; i++) {
        var link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = css[i] + v;
        head.appendChild(link);
      }
    }());
  </script>
</head>
<body>

<div class="app-shell">

  <main class="page">
    <div class="profile-view-page">

      <!-- Back bar -->
      <div class="pv-back-bar">
        <button class="btn btn-ghost btn-sm" onclick="history.back()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Zurück
        </button>
      </div>

      <!-- Dynamic content injected by ProfileView.init() -->
      <div id="profile-view-main"></div>

    </div>
  </main>

</div>

<!-- ── Section jump buttons ─────────────────────────────────── -->
<div class="section-jumper" id="pv-section-jumper">
  <button class="section-jump-btn" id="pv-jump-top" aria-label="Ganz nach oben">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 6l4-4 4 4"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="section-jump-btn" id="pv-jump-up" aria-label="Vorheriger Abschnitt">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="section-jump-btn" id="pv-jump-down" aria-label="Nächster Abschnitt">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- ── Edit FAB (nur für eigenes Profil) ────────────────────── -->
<button class="pv-edit-fab" id="pv-edit-fab" aria-label="Profil bearbeiten">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M11 2l3 3-9 9H2v-3L11 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<script>
window.addEventListener('load', function() {
  var params     = new URLSearchParams(window.location.search);
  var viewerUid  = params.get('viewer');
  var profileUid = params.get('uid');

  function _init() {
    /* Build Navbar with correct session context:
       - viewerUid present  → viewer is logged in → show their wallet + menu
       - viewerUid absent   → public / unauthenticated → show login button only
       Never pass Auth.current() here — on profile-view.html ?uid= identifies
       the PROFILE being viewed, not the session owner. */
    var navOptions = viewerUid
      ? { viewerUid: viewerUid }
      : { loginBtn: { label: 'Anmelden', onClick: function() { window.location.href = './landing.html'; } } };
    Navbar.init('profile', navOptions);
    ProfileView.init();
    if (viewerUid && profileUid && viewerUid !== profileUid) {
      ChatPanel.init({ uid: viewerUid });
    }
  }
  if (typeof CurrencyService !== 'undefined' && typeof CurrencyService.onReady === 'function') {
    CurrencyService.onReady(_init);
  } else { _init(); }
});
</script>

<!-- ── Chat FAB (nur für fremde Profile) ─────────────────── -->
<div class="chat-fab-anchor">
  <button class="chat-fab" id="chat-fab" aria-label="Chat">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

</body>
</html>
