<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Skiing — Teacher-Katalog | BookingSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <script src="./js/app-config.js"></script>
  <script>
    /* CSS-Injection: versioned CSS links, synchron — browser blockiert Rendering */
    (function() {
      var v = typeof APP_VERSION !== 'undefined' ? ('?v=' + APP_VERSION) : '';
      var css = [
        './css/tokens.css',
        './css/base.css',
        './css/components.css',
        './css/navbar.css',
        './css/skiing.css',
      ];
      var head = document.head;
      for (var i = 0; i < css.length; i++) {
        var link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = css[i] + v;
        head.appendChild(link);
      }
    }());
  </script>
</head>
<body>

<!-- Navbar injected by navbar.js -->

<main class="skiing-main">
  <div class="skiing-placeholder">

    <!-- Illustration -->
    <div class="skiing-placeholder-visual" aria-hidden="true">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ring -->
        <circle cx="60" cy="60" r="56" stroke="var(--color-800)" stroke-width="1.5" stroke-dasharray="6 4"/>
        <!-- Inner circle -->
        <circle cx="60" cy="60" r="40" fill="var(--color-900)" stroke="var(--color-700)" stroke-width="1"/>
        <!-- Ski icon -->
        <path d="M30 75 Q45 60 60 50 Q75 40 90 45" stroke="var(--color-400)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M28 82 Q43 67 58 57 Q73 47 88 52" stroke="var(--color-600)" stroke-width="2" stroke-linecap="round"/>
        <!-- Snowflake -->
        <path d="M60 30 v10 M60 80 v10 M35 55 h10 M75 55 h10" stroke="var(--color-500)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M43 38 l7 7 M70 65 l7 7 M43 72 l7-7 M70 38 l7-7" stroke="var(--color-700)" stroke-width="1" stroke-linecap="round"/>
        <!-- Center dot -->
        <circle cx="60" cy="60" r="4" fill="var(--color-400)"/>
      </svg>
    </div>

    <div class="skiing-placeholder-content">
      <span class="skiing-placeholder-eyebrow">Skiing</span>
      <h1 class="skiing-placeholder-title">Finde deinen Ski-Lehrer</h1>
      <p class="skiing-placeholder-desc">
        Durchstöbere unsere verifizierten Ski-Coaches — von Anfänger bis Experten,
        Einzel- und Gruppenunterricht.
      </p>
      <div class="skiing-placeholder-actions">
        <a class="btn btn-primary" href="./skiing-catalog.html">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Lehrer entdecken
        </a>
        <a class="btn btn-ghost" href="./landing.html">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Zurück
        </a>
      </div>
    </div>

  </div>
</main>
<!-- Scroll-to-top button -->
<div class="section-jumper" id="section-jumper">
  <button class="section-jump-btn jump-top" id="jump-top" aria-label="Zum Seitenanfang">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 12l5-8 5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="4" x2="13" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<!-- Chat FAB -->
<div class="chat-fab-anchor">
  <button class="chat-fab" id="chat-fab" aria-label="Chat">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

</body>
</html>
