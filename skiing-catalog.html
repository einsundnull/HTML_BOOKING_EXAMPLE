<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skiing — Lehrer finden | BookingSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/navbar.css" />
  <link rel="stylesheet" href="./css/profile.css" />
  <link rel="stylesheet" href="./css/landing.css" />
  <link rel="stylesheet" href="./css/skiing-catalog.css" />
</head>
<body>

<!-- Navbar injected by skiing-catalog.js -->

<!-- Catalog header -->
<div class="catalog-header">
  <div class="catalog-header-inner">
    <div class="catalog-header-top">
      <a class="catalog-back-link" href="./skiing.html">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Skiing
      </a>
    </div>
    <h1 class="catalog-title">Lehrer finden</h1>
    <p class="catalog-subtitle" id="catalog-subtitle">Ski-Lehrer werden geladen…</p>

    <!-- Filter bar -->
    <div class="catalog-filters" id="catalog-filters">
      <div class="catalog-filter-group">
        <span class="catalog-filter-label">Level</span>
        <div class="catalog-filter-chips" id="filter-level">
          <button class="catalog-chip active" data-filter="level" data-value="">Alle</button>
          <button class="catalog-chip" data-filter="level" data-value="beginner">Anfänger</button>
          <button class="catalog-chip" data-filter="level" data-value="intermediate">Mittelstufe</button>
          <button class="catalog-chip" data-filter="level" data-value="advanced">Fortgeschritten</button>
          <button class="catalog-chip" data-filter="level" data-value="expert">Experten</button>
        </div>
      </div>
      <div class="catalog-filter-group">
        <span class="catalog-filter-label">Unterricht</span>
        <div class="catalog-filter-chips" id="filter-lesson">
          <button class="catalog-chip active" data-filter="lesson" data-value="">Alle</button>
          <button class="catalog-chip" data-filter="lesson" data-value="private">Einzelunterricht</button>
          <button class="catalog-chip" data-filter="lesson" data-value="group">Gruppenunterricht</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Catalog grid -->
<main class="catalog-main">
  <div class="catalog-inner">
    <div class="catalog-grid" id="catalog-grid">
      <!-- Cards injected by skiing-catalog.js -->
    </div>
    <!-- Empty state -->
    <div class="catalog-empty is-hidden" id="catalog-empty">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <circle cx="24" cy="24" r="20" stroke="var(--neutral-300)" stroke-width="1.5" stroke-dasharray="5 3"/>
        <path d="M16 24h16M24 16v16" stroke="var(--neutral-300)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p class="catalog-empty-text">Kein Lehrer gefunden.</p>
      <button class="btn btn-ghost btn-sm" id="catalog-reset-filters">Filter zurücksetzen</button>
    </div>
  </div>
</main>

<!-- Auth modal container (AuthModal from landing.js injects here) -->
<div id="auth-modal-container"></div>

<script src="./js/store.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/profile.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/navbar.js"></script>
<script src="./js/landing.js"></script>
<script src="./js/skiing-catalog.js"></script>
<!-- Section jump buttons -->
<div class="section-jumper" id="section-jumper">
  <button class="section-jump-btn" id="jump-up" aria-label="Vorherige Karte">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 10l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="section-jump-btn" id="jump-down" aria-label="Nächste Karte">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="section-jump-btn jump-top" id="jump-top" aria-label="Zum Seitenanfang">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 12l5-8 5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="4" x2="13" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<!-- Chat FAB -->
<div class="chat-fab-anchor">
  <button class="chat-fab" id="chat-fab" aria-label="Chat">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

</body>
</html>
