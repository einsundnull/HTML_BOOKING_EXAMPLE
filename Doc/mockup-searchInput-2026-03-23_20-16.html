.modal{

  padding:var(--sp-4);

.modal-title{font-size:var(--text-body);font-weight:var(--weight-semibold);color:var(--neutral-900);margin-bottom:var(--sp-3);display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:28px;height:28px;border:none;background:transparent;color:var(--neutral-400);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);}

.booking-form-check-row{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--text-caption);cursor:pointer;padding:var(--sp-1) 0;}
.booking-form-checkbox{width:14px;height:14px;cursor:pointer;accent-color:var(--color-900);flex-shrink:0;}
.booking-form-students{display:flex;flex-direction:column;gap:var(--sp-1);}
.booking-form-check-row--booked{opacity:.5;cursor:default;pointer-events:none;}
.booking-form-already-badge{display:inline-flex;align-items:center;gap:var(--sp-1);font-size:10px;font-weight:var(--weight-semibold);color:#14532d;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:1px var(--sp-2);margin-left:var(--sp-1);}
.booking-form-divider{display:flex;align-items:center;gap:var(--sp-2);margin:var(--sp-1) 0;}
.booking-form-divider-line{flex:1;height:1px;background:var(--neutral-200);}
.booking-form-divider-label{font-size:10px;font-weight:var(--weight-semibold);color:var(--neutral-400);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}

/* ──────────────────────────────────────────
   NEW: Search input — components.css
   .search-input-wrap
   .search-input
   .search-input-clear
   ────────────────────────────────────────── */
.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  margin-bottom: var(--sp-2);
}
.search-input-wrap .search-icon {
  position: absolute;
  left: var(--sp-2);
  color: var(--neutral-400);
  pointer-events: none;
  display: flex;
  align-items: center;
}
.search-input {
  width: 100%;
  height: 34px;
  padding: 0 var(--sp-4) 0 calc(var(--sp-2) + 16px + var(--sp-1));
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-md);
  background: var(--neutral-50);
  font-family: var(--font);
  font-size: var(--text-caption);
  color: var(--neutral-900);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-input::placeholder { color: var(--neutral-400); }
.search-input:focus {
  border-color: var(--color-400);
  background: var(--neutral-0);
  box-shadow: var(--focus-ring);
}
.search-input-clear {
  position: absolute;
  right: var(--sp-2);
  width: 18px; height: 18px;
  border-radius: 50%;
  border: none;
  background: var(--neutral-300);
  color: var(--neutral-0);
  cursor: pointer;
  display: none; /* shown via JS when input has value */
  align-items: center;
  justify-content: center;
  font-size: 11px;
  line-height: 1;
  touch-action: manipulation;
}
.search-input-wrap.has-value .search-input-clear { display: flex; }
/* ── end new classes ── */

/* No results */
.search-empty{font-size:var(--text-caption);color:var(--neutral-400);padding:var(--sp-2) 0;text-align:center;}

/* Footer buttons */
.modal-footer{display:flex;justify-content:flex-end;gap:var(--sp-2);margin-top:var(--sp-4);}
.btn{font-family:var(--font);font-size:var(--text-caption);font-weight:var(--weight-semibold);border-radius:var(--radius-sm);padding:0 var(--sp-3);height:36px;cursor:pointer;border:none;display:inline-flex;align-items:center;}
.btn-ghost{background:transparent;color:var(--neutral-500);}
.btn-secondary{background:var(--color-100);color:#2b4d6b;}
.btn-primary{background:var(--color-900);color:var(--neutral-0);}
.btn-primary.is-hidden{display:none;}
</style>
