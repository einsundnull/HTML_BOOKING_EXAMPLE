  CSS:    teacher.css — new: .dv-v2-avatar-stack, .dv-v2-avatar-stack-item
  CHANGE: In booked slot rows, show stacked overlapping avatars in dv-slot-info
          instead of empty space. Each circle = one booked student.
          Max 3 shown + overflow badge "+N" if more.
  DATE:   2026-03-23 23:30
-->
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --font:'Figtree',sans-serif;
  --color-50:#f0f3f7;--color-100:#dde4ed;--color-200:#bccada;
  --color-300:#8fa9c0;--color-400:#4d7aa0;--color-900:#060f1c;
  --neutral-0:#fff;--neutral-50:#f8f9fb;--neutral-100:#f0f2f5;
  --neutral-200:#e2e6eb;--neutral-300:#c9d0d9;--neutral-400:#9aa3af;
  --neutral-500:#6b7685;--neutral-700:#2d3540;--neutral-900:#0d1117;
  --pending-amber:#f5a623;--pending-amber-bg:#fffbec;--pending-amber-tx:#7a5c00;
  --booked-bg:#0f2a3f;--booked-bar:#4d7aa0;--booked-list:#0a1f30;
  --sp-1:4px;--sp-2:8px;--sp-3:16px;
  --radius-sm:4px;--radius-md:8px;
  --text-caption:12px;--weight-semibold:600;
  --transition:150ms ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#e5e8ec;padding:20px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.col{display:flex;flex-direction:column;gap:8px;align-items:center;}
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#6b7685;text-align:center;}
.device{width:340px;background:var(--neutral-50);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);}

/* Topbar stub */
.dv-topbar{display:flex;align-items:center;gap:4px;padding:0 8px;background:var(--color-900);min-height:44px;}
.dv-topbar-center{flex:1;display:flex;flex-direction:column;align-items:center;}
.dv-topbar-weekday{font-size:9px;font-weight:600;color:var(--color-300);text-transform:uppercase;letter-spacing:.08em;}
.dv-topbar-date{font-size:13px;font-weight:600;color:#fff;}
.dv-topbar-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:12px;}

/* Section label */
.dv-section-label{background:var(--neutral-50);border-top:1px solid var(--neutral-100);border-bottom:1px solid var(--neutral-100);padding:3px 14px;font-size:10px;font-weight:600;color:var(--neutral-400);text-transform:uppercase;letter-spacing:.06em;}

/* Base slot row */
.dv-slot-row{display:flex;align-items:stretch;height:52px;border-bottom:1px solid var(--neutral-100);position:relative;}
.dv-slot-row:last-child{border-bottom:none;}
.dv-slot-row::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 2px 2px 0;}
.dv-s-available{background:var(--color-50);}
.dv-s-available::before{background:var(--color-400);}
.dv-s-booked{background:var(--booked-bg);cursor:pointer;}
.dv-s-booked::before{background:var(--booked-bar);}
.dv-s-timeout{background:var(--pending-amber-bg);}
.dv-s-timeout::before{background:var(--pending-amber);}

/* Time col */
.dv-slot-time{width:58px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 8px 0 12px;gap:2px;}
.dv-time-start{font-family:'Courier New',monospace;font-size:13px;font-weight:600;line-height:1;color:var(--neutral-700);}
.dv-time-end{font-family:'Courier New',monospace;font-size:11px;font-weight:400;line-height:1;color:var(--neutral-400);}
.dv-s-booked .dv-time-start{color:var(--color-300);}
.dv-s-booked .dv-time-end{color:rgba(255,255,255,.25);}

/* Sep */
.dv-slot-sep{width:1px;margin:8px 0;flex-shrink:0;background:var(--neutral-200);}
.dv-s-booked .dv-slot-sep{background:rgba(255,255,255,.10);}

/* Info + action */
.dv-slot-info{flex:1;display:flex;align-items:center;padding:0 8px 0 12px;min-width:0;}
.dv-slot-action{display:flex;align-items:center;gap:6px;padding:0 12px 0 6px;flex-shrink:0;}

/* Chevron */
.dv-chevron-v2{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Plus btn */
.dv-v2-add-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ══════════════════════════════════════════════════════
   NEW: Stacked avatars — teacher.css
   .dv-v2-avatar-stack       — flex row, negative margin creates overlap
   .dv-v2-avatar-stack-item  — individual circle
   .dv-v2-avatar-stack-more  — "+N" overflow badge
   ══════════════════════════════════════════════════════ */
.dv-v2-avatar-stack {
  display: flex;
  align-items: center;
  /* negative margin-left on children creates the stacking overlap */
}
.dv-v2-avatar-stack-item {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--booked-bg); /* matches row bg — creates "gap" illusion */
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
  margin-left: -8px; /* overlap */
  overflow: hidden;
}
.dv-v2-avatar-stack-item:first-child {
  margin-left: 0; /* first item has no negative margin */
}
.dv-v2-avatar-stack-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
/* Color variants for initials */
.av1{background:#1e4060;}
.av2{background:#2b5278;}
.av3{background:#1e5c45;}
.av4{background:#5c2b6b;}

/* "+N" overflow pill */
.dv-v2-avatar-stack-more {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--booked-bg);
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.8);
  font-size: 9px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-left: -8px;
}
/* ── end new classes ── */
</style>
