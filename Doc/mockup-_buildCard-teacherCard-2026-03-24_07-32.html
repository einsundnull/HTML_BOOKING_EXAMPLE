<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet">

:root{

  --weight-regular:400;--weight-semibold:600;
  --shadow:0 1px 3px rgba(6,15,28,.08);
  --shadow-lg:0 4px 16px rgba(6,15,28,.12);
  --focus-ring:0 0 0 3px rgba(77,122,160,.3);
  --transition:150ms ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#1a2535;min-height:100vh;padding:20px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.col{display:flex;flex-direction:column;gap:10px;align-items:center;}
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.4);text-align:center;}

/* ── Language badge (existing) ── */
.pv-lang-badge{display:inline-flex;align-items:center;justify-content:center;padding:1px 5px;border:1px solid var(--neutral-300);border-radius:var(--radius-sm);font-size:10px;font-weight:600;color:var(--neutral-600);}
.tc-discipline-badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--color-50);color:var(--color-600);border:1px solid var(--color-100);}

/* ════════════════════════════════════════════════════════
   NEW CARD DESIGN
   ════════════════════════════════════════════════════════ */
.tc-card-new {
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
  width: 300px;
  box-shadow: var(--shadow-lg);
  transition: box-shadow var(--transition);
}

/* ── Banner — gradient background acting as cover ── */
.tc-banner {
  height: 72px;
  background: linear-gradient(135deg, var(--color-700) 0%, var(--color-500) 100%);
  position: relative;
  flex-shrink: 0;
}
/* Discipline watermark in banner */
.tc-banner-disc {
  position: absolute;
  right: var(--sp-3);
  bottom: var(--sp-2);
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
  letter-spacing: .08em;
}
/* Fav button top-right of banner */
.tc-fav-btn-new {
  position: absolute;
  top: var(--sp-2);
  right: var(--sp-2);
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.7);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.tc-fav-btn-new.is-favorite { color: #f87171; background: rgba(255,255,255,.2); }

/* ── Avatar circle — overlaps banner bottom ── */
.tc-avatar-row {
  display: flex;
  align-items: flex-end;
  gap: var(--sp-2);
  padding: 0 var(--sp-3);
  margin-top: -24px; /* pull up to overlap banner */
  position: relative;
  z-index: 1;
}
.tc-avatar-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid var(--neutral-0);
  object-fit: cover;
  background: var(--neutral-100);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--neutral-300);
  flex-shrink: 0;
  overflow: hidden;
}
.tc-avatar-circle img { width:100%;height:100%;object-fit:cover;border-radius:50%; }

/* Price pulled to right of avatar row */
.tc-avatar-row-price {
  margin-left: auto;
  padding-bottom: 4px;
  font-size: var(--text-body);
  font-weight: var(--weight-semibold);
  color: var(--color-500);
  white-space: nowrap;
}

/* ── Card body ── */
.tc-card-body {
  padding: var(--sp-2) var(--sp-3) 0;
}
.tc-name-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: 3px;
}
.tc-name {
  font-size: var(--text-body);
  font-weight: var(--weight-semibold);
  color: var(--neutral-900);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tc-meta-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
  margin-bottom: var(--sp-2);
}
.tc-exp {
  font-size: var(--text-caption);
  color: var(--neutral-400);
}
.tc-location {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: var(--text-caption);
  color: var(--neutral-500);
}
.tc-langs {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-left: auto;
}

/* ── Action row (same structure as existing .tc-actions) ── */
.tc-actions-new {
  display: flex;
  border-top: 1px solid var(--neutral-100);
  margin-top: var(--sp-2);
}
.tc-action-btn-new {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-1);
  padding: var(--sp-2) var(--sp-3);
  background: none;
  border: none;
  border-right: 1px solid var(--neutral-100);
  cursor: pointer;
  font-family: var(--font);
  font-size: var(--text-caption);
  font-weight: var(--weight-semibold);
  color: var(--neutral-600);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
  min-height: 40px;
}
.tc-action-btn-new:last-child { border-right: none; }
.tc-action-btn-new.is-connected { color: var(--status-confirmed-tx); }
.tc-action-btn-new:hover { background: var(--neutral-50); color: var(--neutral-900); }
</style>
