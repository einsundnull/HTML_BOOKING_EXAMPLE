<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login — Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <script src="./js/app-config.js"></script>
  <script>
    /* CSS-Injection: versioned CSS links, synchron — browser blockiert Rendering */
    (function() {
      var v = typeof APP_VERSION !== 'undefined' ? ('?v=' + APP_VERSION) : '';
      var css = [
        './css/tokens.css',
        './css/base.css',
        './css/components.css',
        './css/login.css',
      ];
      var head = document.head;
      for (var i = 0; i < css.length; i++) {
        var link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = css[i] + v;
        head.appendChild(link);
      }
    }());
  </script>
</head>
<body>

<main class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="1" y="1" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 10h8M10 6v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      BookingSystem
    </div>

    <h1 class="login-heading">Sign in</h1>
    <p class="login-sub">Enter your UID to continue.</p>

    <div class="form-group">
      <label class="form-label" for="uid-input">Your UID</label>
      <input
        class="form-input"
        type="text"
        id="uid-input"
        placeholder="e.g. admin, t1, s1"
        autocapitalize="none"
        spellcheck="false"
      />
      <span class="form-error-msg" id="uid-error" class="is-hidden"></span>
    </div>
    <button class="btn btn-primary login-btn" id="login-btn">
      Sign in
    </button>

    <div class="login-hint">
      <strong>Demo accounts</strong>
      <span id="hint-accounts">Loading…</span>
    </div>

  </div>
</main>
<script>
  // Alten Session-Key aus früheren Builds entfernen
  try { localStorage.removeItem('app_session'); } catch(e) {}

  /* All logic deferred until 'load' — guarantees defer scripts (Store, ProfileStore etc.)
     are fully executed before this runs. */
  window.addEventListener('load', function() {

    function _esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderHint() {
      var users = Store.Users.all();
      var el    = document.getElementById('hint-accounts');
      if (!users.length) {
        el.textContent = 'Noch keine Benutzer. Starte mit UID: admin';
        return;
      }
      var html = '';
      for (var i = 0; i < users.length; i++) {
        var u = users[i];
        html += '<code class="hint-code">'
          + _esc(u.uid) + '</code> — ' + _esc(ProfileStore.getDisplayName(u.uid))
          + ' <span class="hint-role">(' + _esc(u.role) + ')</span><br>';
      }
      el.innerHTML = html;
    }
    renderHint();

    var errEl = document.getElementById('uid-error');
    var input = document.getElementById('uid-input');

    function _hideError() { errEl.classList.add('is-hidden'); }
    function _showError(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('is-hidden');
    }

    function doLogin() {
      _hideError();
      var uid = input.value.trim();

      if (!uid) {
        _showError('Bitte UID eingeben.');
        input.focus();
        return;
      }

      var user = Store.Users.byUid(uid);
      if (!user) {
        _showError('Kein Benutzer mit UID "' + _esc(uid) + '" gefunden.');
        input.select();
        return;
      }

      var map = { admin: './admin.html', teacher: './teacher.html', student: './student.html' };
      var target = map[user.role];
      if (!target) {
        _showError('Unbekannte Rolle: ' + _esc(user.role));
        return;
      }

      window.location.href = target + '?uid=' + encodeURIComponent(user.uid);
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
    input.addEventListener('input', _hideError);
  });
</script>
</body>
</html>
