<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css?v=3" />
  <link rel="stylesheet" href="./css/base.css?v=3" />
  <link rel="stylesheet" href="./css/components.css?v=3" />
</head>
<body>

<main class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="1" y="1" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 10h8M10 6v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      BookingSystem
    </div>

    <h1 class="login-heading">Sign in</h1>
    <p class="login-sub">Enter your UID to continue.</p>

    <div class="form-group">
      <label class="form-label" for="uid-input">Your UID</label>
      <input
        class="form-input"
        type="text"
        id="uid-input"
        placeholder="e.g. admin, t1, s1"
        autocapitalize="none"
        spellcheck="false"
      />
      <span class="form-error-msg" id="uid-error" style="display:none;"></span>
    </div>
    <button class="btn btn-primary login-btn" id="login-btn">
      Sign in
    </button>

    <div class="login-hint">
      <strong>Demo accounts</strong>
      <span id="hint-accounts">Loading…</span>
    </div>

  </div>
</main>

<script src="./js/store.js?v=8"></script>
<script src="./js/profile.js?v=8"></script>
<script>
  // Alten Session-Key aus früheren Builds entfernen
  try { localStorage.removeItem('app_session'); } catch(e) {}

  function renderHint() {
    var users = Store.Users.all();
    var el    = document.getElementById('hint-accounts');
    if (!users.length) {
      el.textContent = 'Noch keine Benutzer. Starte mit UID: admin';
      return;
    }
    var html = '';
    for (var i = 0; i < users.length; i++) {
      var u = users[i];
      html += '<code class="hint-code">'
        + u.uid + '</code> — ' + ProfileStore.getDisplayName(u.uid)
        + ' <span class="hint-role">(' + u.role + ')</span><br>';
    }
    el.innerHTML = html;
  }
  renderHint();

  document.getElementById('login-btn').addEventListener('click', function() { doLogin(); });
  document.getElementById('uid-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('uid-input').addEventListener('input', function() {
    document.getElementById('uid-error').style.display = 'none';
  });

  function doLogin() {
    var errEl = document.getElementById('uid-error');
    var input = document.getElementById('uid-input');
    var uid   = input.value.trim();
    errEl.style.display = 'none';

    if (!uid) {
      errEl.textContent = 'Bitte UID eingeben.';
      errEl.style.display = 'block';
      input.focus();
      return;
    }

    var user = Store.Users.byUid(uid);
    if (!user) {
      errEl.textContent = 'Kein Benutzer mit UID "' + uid + '" gefunden.';
      errEl.style.display = 'block';
      input.select();
      return;
    }

    var map = { admin: './admin.html', teacher: './teacher.html', student: './student.html' };
    var target = map[user.role];
    if (!target) {
      errEl.textContent = 'Unbekannte Rolle: ' + user.role;
      errEl.style.display = 'block';
      return;
    }

    window.location.href = target + '?uid=' + encodeURIComponent(user.uid);
  }
</script>
</body>
</html>
